<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Check certificate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="font-['Montserrat'] bg-[#EEF4F6]">
    <div class="section-1 w-full py-[64px] bg-[#EEF4F6] min-h-screen">
      <div
        class="container px-3.5 md:px-0 sm:py-0 md:w-full md:py-0 lg:w-full mx-auto relative"
      >
        <a
          href="/"
          class="flex w-fit items-center gap-2 text-sm text-[#6B7A8C] mb-6"
        >
          <svg
            width="20"
            height="20"
            viewBox="0 0 20 20"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M10.0003 15.8333L4.16699 10L10.0003 4.16667"
              stroke="#023047"
              stroke-width="1.66667"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <path
              d="M15.8337 10H4.16699"
              stroke="#023047"
              stroke-width="1.66667"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <span class="text-[#023047] text-lg">Назад</span>
        </a>

        <div
          class="mb-8 w-full bg-[#FED3CD] flex flex-col items-center justify-center py-[24px] px-4 rounded-xl gap-2"
        >
          <p class="text-base text-[20px] font-medium text-[#B91C1C]">
            Сертификат не найден
          </p>
          <p class="text-base text-[16px] font-medium text-[#B91C1C]">
            Либо Вы ввели неправильный номер сертификата
          </p>

          <button
            class="w-auto px-8 py-3 mt-4 cursor-pointer rounded-[999px] border border-[#B91C1C] text-[14px] font-semibold text-[#B91C1C] text-center"
          >
            Попробовать снова
          </button>
        </div>

        <div
          class="w-full bg-[#219EBC] py-[82.5px] px-6 md:px-[48px] rounded-[10px]"
        >
          <p class="text-white text-[16px]"># 127 127</p>
          <p class="font-semibold text-white text-[36px] mt-[72px]">
            Малдыбаева Сауле Маратовна
          </p>
        </div>

        <div class="w-full flex flex-col mt-10 gap-8">
          <p class="text-2xl md:text-[32px] font-semibold">
            Подробная информация
          </p>
          <div
            id="certificate-fields"
            class="w-full flex flex-col gap-6 bg-white rounded-lg shadow-md p-[24px]"
          ></div>
        </div>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const certificateData = [
          {
            label: "Название курса:",
            value:
              "Қазақстан Республикасында орта білім мазмұнын жаңарту шеңберінде қазақ тілінде оқытатын мектептердегі бастауыш сынып пәндерін оқыту мен оқудың ерекшеліктері",
          },
          { label: "Тренер:", value: "Хазиев Диас Аманович" },
          { label: "Номер сертификата:", value: "# 127 127" },
          { label: "Дата выдачи:", value: "11.05.2022" },
          { label: "Дата проверки:", value: "12.03.2026 21:10" },
        ];

        const container = document.getElementById("certificate-fields");
        if (container) {
          container.innerHTML = certificateData
            .map(
              (item) => `
            <div class="flex flex-col lg:flex-row items-start gap-4 w-full">
              <p class="text-base font-medium text-[#011D2C] w-full lg:w-1/5">
                ${item.label}
              </p>
              <p class="font-light text-[#011D2C] flex-1">
                ${item.value}
              </p>
            </div>
          `,
            )
            .join("");
        }
      });
    </script>
  </body>
</html>
